name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Compile TypeScript (type-check only)
        run: npx tsc --noEmit

      - name: Start mock LLM server
        run: |
          npx ts-node src/mocks/mock-llm-server.ts &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2

      - name: Run Playwright tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (traces + screenshots)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Stop mock server
        if: always()
        run: kill $SERVER_PID || true
